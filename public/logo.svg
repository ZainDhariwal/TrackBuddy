<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Rich Blue App Background -->
    <linearGradient id="appBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="50%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#1e40af" />
    </linearGradient>

    <!-- Glassy Bars -->
    <linearGradient id="glassBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.1" />
    </linearGradient>

    <!-- Checkmark Gradient (Cyan to White) -->
    <linearGradient id="checkSwoosh" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#67e8f9" />
      <stop offset="100%" stop-color="#ffffff" />
    </linearGradient>

    <filter id="glassShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000000" flood-opacity="0.25"/>
    </filter>

    <filter id="checkGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- App Icon Squircle (macOS Style) -->
  <rect x="32" y="32" width="448" height="448" rx="100" fill="url(#appBg)" />
  
  <!-- Subtle inner border for depth -->
  <rect x="33" y="33" width="446" height="446" rx="99" fill="none" stroke="#ffffff" stroke-opacity="0.2" stroke-width="2" />

  <!-- Ascending Consistency Bars -->
  <rect x="136" y="280" width="56" height="110" rx="28" fill="url(#glassBar)" opacity="0.4" />
  <rect x="228" y="210" width="56" height="180" rx="28" fill="url(#glassBar)" opacity="0.75" />
  <rect x="320" y="140" width="56" height="250" rx="28" fill="url(#glassBar)" filter="url(#glassShadow)" />

  <!-- Dynamic Success Checkmark -->
  <path d="M 110 270 L 210 360 L 402 160" fill="none" stroke="url(#checkSwoosh)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" filter="url(#checkGlow)"/>
</svg>
